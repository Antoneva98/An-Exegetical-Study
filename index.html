<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Екзегетичне дослідження</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      margin-bottom: 40px;
      color: #333;
    }
    a {
      display: block;
      margin: 16px 0;
      padding: 16px 32px;
      background: #2c3e50;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      transition: background 0.2s;
    }
    a:hover {
      background: #3498db;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Екзегетичне дослідження</h1>
    <a href="Конспект екзегетичного дослідження.html">📖 Конспект</a>
    <a href="Чек-лист екзегетичного дослідження.html">✅ Чек-лист</a>
  </div>

</html>
