<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Конспект · Методологія екзегетичного дослідження НЗ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="guide.css" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F1EA;
    --surface: #FCFBF7;
    --ink: #1A1813;
    --muted: #6E695E;
    --line: #E5DFD2;
    --hero: #181610;
    --hero-ink: #F1ECE0;
    --hero-muted: #A39C8B;
    --hl: #FBE6A0;
    --accent: #EC6016;
    --code: #EDE9DE;
    --r: 14px;
    --sans: "Manrope", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  .root {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── Hero ─────────────────────────────────────────────── */
  .hero {
    position: relative;
    overflow: hidden;
    background: var(--hero);
    color: var(--hero-ink);
    border-bottom: 1px solid #000;
  }
  .hero-bg {
    position: absolute;
    top: -14%;
    right: -6%;
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(150px, 34vw, 460px);
    line-height: 0.8;
    letter-spacing: -0.04em;
    color: #ffffff;
    opacity: 0.05;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    will-change: transform;
  }
  .hero-inner {
    position: relative;
    max-width: 760px;
    margin: 0 auto;
    padding: clamp(40px, 9vw, 76px) clamp(20px, 6vw, 48px) clamp(34px, 7vw, 56px);
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: calc(12px * var(--scale));
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
  }
  .hero-title {
    font-size: calc(clamp(30px, 8vw, 50px) * var(--scale));
    line-height: 1.04;
    font-weight: 800;
    letter-spacing: -0.025em;
    margin: 0 0 20px;
    text-wrap: balance;
  }
  .hero-sub {
    font-size: calc(clamp(15px, 4vw, 17px) * var(--scale));
    line-height: 1.55;
    color: var(--hero-muted);
    margin: 0 0 26px;
    max-width: 52ch;
  }
  .hero-src {
    font-family: var(--mono);
    font-size: calc(11.5px * var(--scale));
    letter-spacing: 0.01em;
    color: var(--hero-muted);
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  /* ── Layout ───────────────────────────────────────────── */
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: clamp(36px, 8vw, 64px) clamp(20px, 6vw, 48px) 80px;
  }
  .block + .block { margin-top: clamp(48px, 10vw, 80px); }
  .block-head { margin-bottom: 26px; }
  .kicker {
    display: inline-block;
    font-family: var(--mono);
    font-size: calc(12px * var(--scale));
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .block-title {
    font-size: calc(clamp(23px, 6vw, 30px) * var(--scale));
    line-height: 1.12;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0;
  }

  /* ── Прогрес ──────────────────────────────────────────── */
  .progress { margin-bottom: 24px; }
  .progress-meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 9px;
  }
  .progress-count {
    font-family: var(--mono);
    font-size: calc(12.5px * var(--scale));
    color: var(--muted);
  }
  .progress-count b { color: var(--ink); font-weight: 700; }
  .reset {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--accent);
    font-family: var(--mono);
    font-size: calc(12px * var(--scale));
    font-weight: 500;
    cursor: pointer;
    padding: 2px 0;
  }
  .reset:hover { opacity: 0.7; }
  .progress-track {
    height: 5px;
    border-radius: 999px;
    background: var(--line);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.35s cubic-bezier(0.3,0.7,0.4,1);
  }

  /* ── Чек-лист ─────────────────────────────────────────── */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .list-item {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
  }
  .row-sub {
    padding: 11px 18px 11px 22px;
    border-top: 1px dashed var(--line);
    background: color-mix(in oklab, var(--bg) 45%, var(--surface));
  }
  .row-link {
    appearance: none;
    border: 0;
    background: transparent;
    text-align: left;
    font: inherit;
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 11px;
    flex: 1;
    min-width: 0;
    color: inherit;
    flex-wrap: wrap;
    padding: 0;
  }
  .row-go {
    margin-left: auto;
    align-self: center;
    font-family: var(--mono);
    font-size: calc(13px * var(--scale));
    color: var(--muted);
    opacity: 0;
    transform: translateX(-3px);
    transition: opacity 0.16s, transform 0.16s, color 0.16s;
  }
  .row-link:hover .row-go,
  .row-link:focus-visible .row-go { opacity: 1; transform: none; color: var(--accent); }
  .row-mark {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
    font-size: calc(13px * var(--scale));
    flex-shrink: 0;
  }
  .row-sub .row-mark { font-size: calc(12.5px * var(--scale)); }
  .row-title {
    font-weight: 700;
    font-size: calc(16.5px * var(--scale));
    letter-spacing: -0.01em;
    line-height: 1.25;
  }
  .row-sub .row-title { font-weight: 600; font-size: calc(14.5px * var(--scale)); }
  .row-link:hover .row-title { text-decoration: underline; text-decoration-color: var(--line); text-underline-offset: 3px; }
  .row-sup {
    font-family: var(--mono);
    font-size: calc(10px * var(--scale));
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--code);
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .row.done .row-title { color: var(--muted); }

  /* ── Чекбокс ──────────────────────────────────────────── */
  .chk {
    appearance: none;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    padding: 0;
    border: 1.8px solid color-mix(in oklab, var(--ink) 26%, var(--surface));
    background: var(--surface);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .chk-lg { width: 26px; height: 26px; border-radius: 8px; }
  .chk-sm { width: 21px; height: 21px; border-radius: 6px; }
  .chk svg {
    width: 70%; height: 70%;
    stroke: #fff;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.15s, transform 0.18s cubic-bezier(0.3,1.4,0.5,1);
  }
  .chk:hover { border-color: var(--accent); }
  .chk.is-on { background: var(--accent); border-color: var(--accent); }
  .chk.is-on svg { opacity: 1; transform: scale(1); }
  .chk:active { transform: scale(0.92); }

  /* ── CTA: запуск гайда ────────────────────────────────── */
  .cta { margin-top: clamp(40px, 8vw, 64px); }
  .cta-inner {
    position: relative;
    overflow: hidden;
    background: var(--hero);
    color: var(--hero-ink);
    border-radius: calc(var(--r) + 4px);
    padding: clamp(28px, 6vw, 44px);
  }
  .cta-inner::after {
    content: "";
    position: absolute;
    right: -40px;
    bottom: -80px;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in oklab, var(--accent) 55%, transparent), transparent 70%);
    pointer-events: none;
  }
  .cta-kicker {
    font-family: var(--mono);
    font-size: calc(12px * var(--scale));
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .cta-title {
    font-size: calc(clamp(22px, 6vw, 30px) * var(--scale));
    line-height: 1.12;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
    text-wrap: balance;
  }
  .cta-sub {
    font-size: calc(15px * var(--scale));
    line-height: 1.55;
    color: var(--hero-muted);
    margin: 0 0 24px;
    max-width: 52ch;
    position: relative;
  }
  .cta-btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-weight: 700;
    font-size: calc(15.5px * var(--scale));
    letter-spacing: -0.01em;
    padding: 13px 22px;
    border-radius: 999px;
    transition: transform 0.14s, filter 0.14s;
  }
  .cta-btn svg { width: 20px; height: 20px; }
  .cta-btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
  .cta-btn:active { transform: translateY(0); }

  /* ── Друк: ТІЛЬКИ чек-лист ────────────────────────────── */
  @page { margin: 14mm 13mm; }
  @media print {
    html { scroll-behavior: auto; }
    .root { background: #fff; }
    .no-print { display: none !important; }
    .hero {
      background: #fff;
      color: var(--ink);
      border-bottom: 1.5px solid var(--ink);
    }
    .hero-inner { padding: 0 0 18px; max-width: none; }
    .eyebrow { color: var(--accent); margin-bottom: 12px; }
    .hero-sub { display: none; }
    .hero-src { color: var(--muted); border-top: 1px solid var(--line); }
    .wrap { padding: 18px 0 0; max-width: none; }
    .block-head { margin-bottom: 16px; }
    .list { gap: 7px; }
    .list-item, .row, .row-sub { break-inside: avoid; }
    .chk, .chk.is-on, .progress-fill, .ex-list li::before, .row-mark {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
